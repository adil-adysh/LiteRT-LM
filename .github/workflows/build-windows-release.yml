# =============================================================================
#
# Builds LiteRT-LM litert_lm_main.exe on Windows, packages into a release
# zip, and uploads it to GitHub Releases.
#
# Pre-installed on windows-2022 runner:
#   - Visual Studio 2022 Enterprise (at C:\Program Files\...\Enterprise)
#   - Bazelisk 1.28.1
#   - Git for Windows (bash at C:\Program Files\Git\bin\bash.exe)
#   - Python 3.x, Java 17+
#   - Windows long paths already enabled
# =============================================================================

name: "Build Windows Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      REFRESH_CACHE:
        description: "Force re-download all Bazel dependencies"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build-Windows-x86_64"
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    permissions:
      actions: write
      contents: write
    env:
      BAZEL_SH: "C:\\PROGRA~1\\Git\\bin\\bash.exe"
      GH_TOKEN: ${{ github.token }}
      REFRESH_CACHE: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.REFRESH_CACHE) }}
      # Clear ANDROID_NDK_HOME: windows-2022 runner has NDK pre-installed but
      # Bazel's android_ndk_repository cannot create symlinks to it.
      ANDROID_NDK_HOME:

    steps:
      - name: Checkout code.
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Detect Visual Studio and MSVC version.
        id: msvc
        run: |
          $vcPaths = @(
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC",
            "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC",
            "C:\Program Files\Microsoft Visual Studio\2022\Community\VC"
          )
          $foundVc = $null
          foreach ($p in $vcPaths) {
            if (Test-Path "$p\Tools\MSVC") {
              $foundVc = $p
              break
            }
          }
          if (-not $foundVc) {
            Write-Host "::error::No Visual Studio VC installation found!"
            exit 1
          }
          echo "BAZEL_VC=$foundVc" >> "$env:GITHUB_ENV"
          $msvcVer = Get-ChildItem "$foundVc\Tools\MSVC" `
            | Sort-Object Name -Descending `
            | Select-Object -First 1 -ExpandProperty Name
          echo "BAZEL_VC_FULL_VERSION=$msvcVer" >> "$env:GITHUB_ENV"
          Write-Host "VC root: $foundVc"
          Write-Host "MSVC version: $msvcVer"

      - name: Set up cache keys.
        id: cache-keys
        run: |
          $CACHE_RESTORE_KEY_2="${{ github.workflow }}"
          $CACHE_RESTORE_KEY_1="$CACHE_RESTORE_KEY_2-${{ hashFiles('**/WORKSPACE', '**/.bazelrc') }}"
          $CACHE_RESTORE_KEY_0="$CACHE_RESTORE_KEY_1-${{ hashFiles('**/BUILD*') }}"
          $CACHE_RESTORE_KEY_HEAD="$CACHE_RESTORE_KEY_0-${{ github.event.pull_request.base.sha }}"
          $CACHE_KEY="$CACHE_RESTORE_KEY_0-${{ github.sha }}"
          echo "CACHE_RESTORE_KEY_2=$CACHE_RESTORE_KEY_2" >> "$env:GITHUB_OUTPUT"
          echo "CACHE_RESTORE_KEY_1=$CACHE_RESTORE_KEY_1" >> "$env:GITHUB_OUTPUT"
          echo "CACHE_RESTORE_KEY_0=$CACHE_RESTORE_KEY_0" >> "$env:GITHUB_OUTPUT"
          echo "CACHE_RESTORE_KEY_HEAD=$CACHE_RESTORE_KEY_HEAD" >> "$env:GITHUB_OUTPUT"
          echo "CACHE_KEY=$CACHE_KEY" >> "$env:GITHUB_OUTPUT"

      - name: Set Bazel output base.
        id: bazel-output
        run: |
          if (Test-Path "D:\") { $base = "D:/w-${{ github.sha }}" }
          else { $base = "C:/w-${{ github.sha }}" }
          echo "BAZEL_OUTPUT_BASE=$base" >> "$env:GITHUB_ENV"
          Write-Host "Output base: $base"

      - name: Clean build outputs if cache is being refreshed.
        if: env.REFRESH_CACHE == 'true'
        run: bazel --output_base="$env:BAZEL_OUTPUT_BASE" clean --expunge

      - name: Restore Bazel cache.
        id: bazel-cache
        if: env.REFRESH_CACHE != 'true'
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/bazel-windows
            ~/.cache/bazel-windows-dll
          key: ${{ steps.cache-keys.outputs.CACHE_KEY }}
          restore-keys: |
            ${{ steps.cache-keys.outputs.CACHE_RESTORE_KEY_HEAD }}
            ${{ steps.cache-keys.outputs.CACHE_RESTORE_KEY_0 }}-
            ${{ steps.cache-keys.outputs.CACHE_RESTORE_KEY_1 }}-
            ${{ steps.cache-keys.outputs.CACHE_RESTORE_KEY_2 }}-

      - name: Build litert_lm_main (CPU, static).
        run: |
          bazel --output_base="$env:BAZEL_OUTPUT_BASE" `
            build --disk_cache=~/.cache/bazel-windows `
            --deleted_packages=swift `
            //runtime/engine:litert_lm_main

      - name: Build litert_lm_main (GPU, dynamic).
        run: |
          bazel --output_base="$env:BAZEL_OUTPUT_BASE" `
            build --disk_cache=~/.cache/bazel-windows-dll `
            --define=litert_link_capi_so=true `
            --define=resolve_symbols_in_exec=false `
            //runtime/engine:litert_lm_main

      - name: Download DirectX Shader Compiler DLLs.
        run: |
          $dxcVersion = "1.9.2602"
          $dxcUrl = "https://github.com/microsoft/DirectXShaderCompiler/releases/download/v$dxcVersion/dxc_2026_02_20.zip"
          $dxcZip = "$env:TEMP\dxc.zip"
          $targetDir = "bazel-bin\runtime\engine"
          Write-Host "Downloading DXC v$dxcVersion ..."
          curl.exe -L -o "$dxcZip" "$dxcUrl"
          Write-Host "Extracting dxil.dll and dxcompiler.dll ..."
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($dxcZip)
          $entries = $zip.Entries | Where-Object { $_.Name -in @("dxil.dll","dxcompiler.dll") -and $_.FullName -match "bin/x64" }
          foreach ($f in $entries) {
            $dest = Join-Path $targetDir $f.Name
            [System.IO.Compression.ZipFileExtensions]::ExtractToFile($f, $dest, $true)
            Write-Host "  Extracted: $($f.Name)"
          }
          $zip.Dispose()
          Remove-Item "$dxcZip" -Force
          Write-Host "DXC ready."

      - name: Package release zip.
        run: |
          $version = "${{ github.ref_name }}"
          $pkgDir = "LiteRT-LM-$version-Windows-x86_64"
          $binDir = "bazel-bin\runtime\engine"
          $prebuiltDir = "prebuilt\windows_x86_64"
          Write-Host "Creating package directory: $pkgDir"
          New-Item "$pkgDir\bin", "$pkgDir\models" -ItemType Directory -Force | Out-Null
          Copy-Item "$binDir\litert_lm_main.exe" "$pkgDir\bin\" -Force
          foreach ($dll in @("libLiteRt.dll","libLiteRtWebGpuAccelerator.dll","libLiteRtTopKWebGpuSampler.dll","libwebgpu_dawn.dll","libGemmaModelConstraintProvider.dll")) {
            Copy-Item "$prebuiltDir\$dll" "$pkgDir\bin\" -Force
          }
          foreach ($dll in @("dxcompiler.dll","dxil.dll")) {
            Copy-Item "$binDir\$dll" "$pkgDir\bin\" -Force
          }
          Set-Content "$pkgDir\models\README.txt" "Place .litertlm model files here. Download from: https://huggingface.co/litert-community" -Encoding UTF8
          $readmeLines = @(
            "========================================================",
            "LiteRT-LM Windows Binary $version",
            "========================================================",
            "Build: ${{ github.sha }}",
            "",
            "QUICK START",
            "  1. Place a .litertlm model file in the models/ folder",
            '  2. Run: .\bin\litert_lm_main.exe --model_path="models\model.litertlm" --backend=cpu',
            '  GPU: .\bin\litert_lm_main.exe --model_path="models\model.litertlm" --backend=gpu',
            "",
            "BACKENDS",
            "  cpu  - XNNPACK with AVX2 (24-core optimized)",
            "  gpu  - NVIDIA GPU via WebGPU / Direct3D 12",
            "",
            "Download models: https://huggingface.co/litert-community"
          )
          $readmeLines | Set-Content "$pkgDir\README.txt" -Encoding UTF8
          $zipFile = "$pkgDir.zip"
          Compress-Archive -Path "$pkgDir\*" -DestinationPath $zipFile -Force
          Write-Host "Release zip created: $zipFile"
          $z = Get-Item $zipFile
          Write-Host "Size: $([math]::Round($z.Length / 1MB, 1)) MB"
          echo "RELEASE_ZIP=$zipFile" >> "$env:GITHUB_ENV"

      - name: Save Bazel cache.
        uses: actions/cache/save@v4
        if: env.REFRESH_CACHE == 'true' || steps.bazel-cache.outputs.cache-hit != 'true'
        with:
          path: |
            ~/.cache/bazel-windows
            ~/.cache/bazel-windows-dll
          key: ${{ steps.cache-keys.outputs.CACHE_KEY }}

      - name: Upload release asset.
        if: github.ref_type == 'tag'
        run: |
          gh release upload ${{ github.ref_name }} "$env:RELEASE_ZIP" --clobber
          Write-Host "Release asset uploaded: ${{ github.ref_name }}"
